<body onload="initializeGallery()">

        <nav aria-label="Điều hướng chính">

        </nav>

    <main id="main-content">
        <section>
            <h2>Triển lãm Tương tác</h2>
            <div id="image">
                Di chuột hoặc Tab qua một hình ảnh bên dưới để hiển thị.
            </div>

            <div class="image-grid">
                <img class="preview" src="https://picsum.photos/id/10/400/300" alt="Phong cảnh núi rừng hùng vĩ" onmouseover="update(this)" onmouseleave="unDo()" onfocus="update(this)" onblur="unDo()">

                <img class="preview" src="https://picsum.photos/id/40/400/300" alt="Mèo con đang ngủ say" onmouseover="update(this)" onmouseleave="unDo()" onfocus="update(this)" onblur="unDo()">
